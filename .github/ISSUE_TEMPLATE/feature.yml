name: ✨ Feature request
description: Suggest a new feature or improvement.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do? What's getting in the way?
      placeholder: I'm trying to X but currently I have to do Y, which is awkward because...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work? Sketches, API ideas, mockups all welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve the same problem that you ruled out.
  - type: textarea
    id: context
    attributes:
      label: Additional context
