name: 🐛 Bug report
description: Something is broken or behaving unexpectedly.
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I do X, Y happens. I expected Z.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: Minimal steps. The fewer the better.
      placeholder: |
        1. Run `...`
        2. Click on `...`
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `<tool> --version`, or commit SHA if from main.
      placeholder: 0.1.0 (or abc1234)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / environment
      placeholder: macOS 15.4, Ubuntu 24.04, Windows 11, etc.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Optional, but helpful. Paste relevant output or attach screenshots.
